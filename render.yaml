services:
  - type: web
    name: storefront-gate-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port $PORT --server.fileWatcherType none
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
