name: Quality Gates

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  STOREFRONT_URL: ${{ vars.STOREFRONT_URL || 'http://localhost:8000' }}
  STORE_API_URL: ${{ vars.STORE_API_URL || 'http://localhost:9000' }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  pr-gate:
    name: PR gate - smoke, contract, a11y, data quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Type-check framework
        run: npx tsc --noEmit

      - name: Playwright smoke gate
        run: npm run test:smoke

      - name: API contract gate
        run: npm run test:api

      - name: Newman collection gate
        run: npm run postman

      - name: Accessibility gate
        run: npm run test:a11y

      - name: Data-quality gate
        if: env.DATABASE_URL != ''
        run: python -m tests.data_quality

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-reports
          path: reports/
          if-no-files-found: ignore

  nightly-load:
    name: Nightly flash-sale load gate
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run flash-sale load model
        run: k6 run --summary-export=reports/load/summary.json tests/load/flash-sale.js

      - name: Upload load artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-gate-reports
          path: reports/load/
          if-no-files-found: ignore
